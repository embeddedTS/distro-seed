config: DS_COMPONENT_TS4100_UTILS
version: "2.0.0"
tasks:
- cmd: ../ts4100-utils/fetch.sh
  cmd_type: host
  provides: DS_ZPU_SRC
  description: Downloading ts4100-utils

- cmd: ../ts4100-utils/cross-packages.sh
  cmd_type: packagelist-cross
  description: Adding ts4100-utils cross dependencies

- cmd: ../ts4100-utils/build.sh
  cmd_type: cross
  dependencies:
    - DS_CROSS_READY
    - DS_ZPU_COMPILER
    - DS_ZPU_SRC
  description: Building ts4100-utils
